name: Keep Supabase Alive

on:
  schedule:
    # Run every 3 days at midnight to prevent Supabase from pausing (pauses after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  ping_services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database (REST API)
        # We send a GET request to the Supabase REST endpoint to generate activity.
        # It uses secrets configured in GitHub Actions to authenticate.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl --fail --silent --show-error "${SUPABASE_URL}/rest/v1/?limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
          echo "Supabase ping successful"
